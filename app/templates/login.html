{% extends "base.html" %}


{% block title %}
Login
{% endblock %}


{% block content %}

<div class="card shadow p-4">

    <h2 class="mb-4">
        Login
    </h2>


    <form method="POST">

        <input
            class="form-control mb-3"
            type="email"
            name="email"
            placeholder="Email"
            required>


        <input
            class="form-control mb-3"
            type="password"
            name="password"
            placeholder="Password"
            required>


        <button class="btn btn-primary">
            Login
        </button>

    </form>

</div>

{% endblock %}
