{% extends "base.html" %}


{% block title %}
Register
{% endblock %}


{% block content %}

<div class="card shadow p-4">

    <h2 class="mb-4">
        Create Account
    </h2>


    <form method="POST">

        <div class="mb-3">
            <input
                class="form-control"
                name="username"
                placeholder="Username"
                required>
        </div>


        <div class="mb-3">
            <input
                class="form-control"
                type="email"
                name="email"
                placeholder="Email"
                required>
        </div>


        <div class="mb-3">
            <input
                class="form-control"
                type="password"
                name="password"
                placeholder="Password"
                required>
        </div>


        <button class="btn btn-primary">
            Register
        </button>

    </form>

</div>

{% endblock %}
